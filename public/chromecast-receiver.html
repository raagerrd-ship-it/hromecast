<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chromecast Website Receiver</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    
    #content {
      border: none;
      position: absolute;
      top: 0;
      left: 0;
    }
    
    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 1000;
    }
    
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      z-index: 999;
    }
  </style>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <div id="status">Ready to cast...</div>
  <div id="loading" style="display:none;">Loading website...</div>
  <iframe id="content" style="display:none;"></iframe>
  
  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    
    const statusEl = document.getElementById('status');
    const loadingEl = document.getElementById('loading');
    const contentEl = document.getElementById('content');
    
    // No fallback - wait for explicit content from bridge
    let contentLoaded = false;
    
    // Set iframe to fill screen exactly
    function setupIframe() {
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;
      
      // Set iframe to screen size - website will see this viewport
      contentEl.width = screenWidth;
      contentEl.height = screenHeight;
      contentEl.style.width = screenWidth + 'px';
      contentEl.style.height = screenHeight + 'px';
      
      console.log(`Iframe set to: ${screenWidth}x${screenHeight}`);
    }
    
    setupIframe();
    window.addEventListener('resize', setupIframe);
    
    // Custom message handler for loading websites
    context.addCustomMessageListener('urn:x-cast:com.website.cast', (customEvent) => {
      const data = customEvent.data;
      console.log('Received custom message:', data);
      
      if (data.type === 'LOAD_WEBSITE') {
        loadWebsite(data.url);
      }
    });
    
    // Override default media load behavior
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (loadRequestData) => {
        console.log('Load request received:', JSON.stringify(loadRequestData, null, 2));
        
        let url = null;
        
        // Try multiple ways to extract the URL
        if (loadRequestData.media) {
          url = loadRequestData.media.contentId || loadRequestData.media.contentUrl;
          console.log('Media contentId:', loadRequestData.media.contentId);
          console.log('Media contentUrl:', loadRequestData.media.contentUrl);
          console.log('Media contentType:', loadRequestData.media.contentType);
        }
        
        if (url) {
          // Check if this is a website URL (not a video/audio file)
          const isWebsite = 
            loadRequestData.media.contentType === 'text/html' ||
            url.endsWith('.html') ||
            (!url.match(/\.(mp4|mp3|webm|mkv|avi|mov|m3u8|mpd)$/i) && 
             (url.startsWith('http://') || url.startsWith('https://')));
          
          console.log('Is website:', isWebsite, 'URL:', url);
          
          if (isWebsite) {
            loadWebsite(url);
            return null; // Block default media handling
          }
        }
        
        return loadRequestData;
      }
    );
    
    function loadWebsite(url) {
      console.log('Loading website:', url);
      
      // Mark content as loaded
      contentLoaded = true;
      
      statusEl.textContent = 'Loading: ' + url;
      loadingEl.style.display = 'block';
      contentEl.style.display = 'none';
      
      // Load the URL in the iframe
      contentEl.src = url;
      
      contentEl.onload = () => {
        console.log('Website loaded successfully');
        statusEl.textContent = 'Connected';
        loadingEl.style.display = 'none';
        contentEl.style.display = 'block';
        
        // Hide status after 3 seconds
        setTimeout(() => {
          statusEl.style.display = 'none';
        }, 3000);
      };
      
      contentEl.onerror = () => {
        console.error('Failed to load website');
        statusEl.textContent = 'Error loading website';
        loadingEl.style.display = 'none';
      };
    }
    
    // Keep connection alive (every 10 seconds)
    setInterval(() => {
      console.log('Keep-alive:', new Date().toISOString());
    }, 10000);
    
    // Auto-refresh every 45 minutes to clear memory
    setInterval(() => {
      console.log('Auto-refresh to clear memory');
      window.location.reload();
    }, 45 * 60 * 1000);
    
    // Start the receiver
    const options = new cast.framework.CastReceiverOptions();
    options.disableIdleTimeout = true;
    
    context.start(options);
    console.log('Chromecast receiver started');
  </script>
</body>
</html>
