<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chromecast Website Receiver</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    
    #content {
      border: none;
      position: absolute;
      top: 0;
      left: 0;
      /* GPU Acceleration */
      transform: translate3d(0, 0, 0);
      will-change: transform, contents;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      /* Förhindra onödig layout-beräkning */
      contain: strict;
    }
    
    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.85);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      max-width: 400px;
      line-height: 1.4;
    }
    
    #status.connected {
      background: rgba(0, 100, 0, 0.85);
    }
    
    #status.error {
      background: rgba(150, 0, 0, 0.85);
    }
    
    #status.warning {
      background: rgba(150, 100, 0, 0.85);
    }
    
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      z-index: 999;
    }
    
    #debug-log {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 11px;
      z-index: 1000;
      max-width: 500px;
      max-height: 200px;
      overflow-y: auto;
      font-family: monospace;
      display: none;
    }
    
    #debug-log.visible {
      display: block;
    }
    
    .log-entry {
      margin: 2px 0;
      opacity: 0.9;
    }
    
    .log-entry.error {
      color: #ff6b6b;
    }
    
    .log-entry.warn {
      color: #ffd93d;
    }
    
    .log-entry.info {
      color: #6bcb77;
    }
  </style>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <div id="status">Ready to cast...</div>
  <div id="loading" style="display:none;">Loading website...</div>
  <div id="debug-log"></div>
  <iframe id="content" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" loading="eager" style="display:none;"></iframe>
  
  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    
    const statusEl = document.getElementById('status');
    const loadingEl = document.getElementById('loading');
    const contentEl = document.getElementById('content');
    const debugLogEl = document.getElementById('debug-log');
    
    // Logging system
    const logBuffer = [];
    const MAX_LOGS = 50;
    let debugLogVisible = true;
    let debugAutoHideTimer = null;
    const DEBUG_AUTO_HIDE_DELAY = 30000; // 30 seconds
    
    function showDebugPanel() {
      debugLogVisible = true;
      debugLogEl.classList.add('visible');
      updateDebugDisplay();
    }
    
    function hideDebugPanel() {
      debugLogVisible = false;
      debugLogEl.classList.remove('visible');
    }
    
    function scheduleDebugAutoHide() {
      // Clear any existing timer
      if (debugAutoHideTimer) {
        clearTimeout(debugAutoHideTimer);
      }
      // Schedule hide after 30 seconds of no issues
      debugAutoHideTimer = setTimeout(() => {
        if (contentLoaded && healthCheckFailures === 0) {
          hideDebugPanel();
        }
      }, DEBUG_AUTO_HIDE_DELAY);
    }
    
    function updateDebugDisplay() {
      if (debugLogVisible) {
        // Sort newest first (reverse order)
        const recentLogs = logBuffer.slice(-15).reverse();
        debugLogEl.innerHTML = recentLogs.map(e => 
          `<div class="log-entry ${e.level}">${e.timestamp} ${e.message}</div>`
        ).join('');
      }
    }
    
    function log(level, message) {
      const timestamp = new Date().toLocaleTimeString('sv-SE');
      const entry = { timestamp, level, message };
      logBuffer.push(entry);
      if (logBuffer.length > MAX_LOGS) logBuffer.shift();
      
      // Console output
      const consoleMsg = `[${timestamp}] ${message}`;
      if (level === 'error') console.error(consoleMsg);
      else if (level === 'warn') console.warn(consoleMsg);
      else console.log(consoleMsg);
      
      // Show debug panel on errors/warnings
      if (level === 'error' || level === 'warn') {
        showDebugPanel();
        // Don't auto-hide after problems - wait for next successful health check
        if (debugAutoHideTimer) {
          clearTimeout(debugAutoHideTimer);
          debugAutoHideTimer = null;
        }
      }
      
      // Update display
      updateDebugDisplay();
    }
    
    function setStatus(text, type = '') {
      statusEl.textContent = text;
      statusEl.className = type;
      log('info', `Status: ${text}`);
    }
    
    // Connection state tracking
    let contentLoaded = false;
    let currentUrl = null;
    let iframeLoadTime = null;
    let lastHealthCheck = Date.now();
    let healthCheckFailures = 0;
    let loadRetryCount = 0;
    const MAX_LOAD_RETRIES = 5;
    const RETRY_DELAYS = [5000, 10000, 20000, 30000, 60000]; // Progressive delays
    
    function scheduleRetry(reason) {
      if (!currentUrl) {
        log('warn', 'No URL to retry');
        return;
      }
      
      if (loadRetryCount >= MAX_LOAD_RETRIES) {
        log('error', `❌ Max retries (${MAX_LOAD_RETRIES}) reached - giving up`);
        setStatus('Connection failed - max retries reached', 'error');
        return;
      }
      
      const delay = RETRY_DELAYS[Math.min(loadRetryCount, RETRY_DELAYS.length - 1)];
      loadRetryCount++;
      
      log('warn', `🔄 Retry #${loadRetryCount} in ${delay/1000}s (${reason})`);
      setStatus(`Reconnecting in ${delay/1000}s... (attempt ${loadRetryCount})`, 'warning');
      
      setTimeout(() => {
        if (currentUrl && !contentLoaded) {
          log('info', `🔄 Attempting reconnection #${loadRetryCount}...`);
          loadWebsite(currentUrl, true); // true = is retry
        }
      }, delay);
    }
    
    // Set iframe to fill screen exactly
    function setupIframe() {
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;
      
      contentEl.width = screenWidth;
      contentEl.height = screenHeight;
      contentEl.style.width = screenWidth + 'px';
      contentEl.style.height = screenHeight + 'px';
      
      log('info', `Viewport: ${screenWidth}x${screenHeight}`);
    }
    
    setupIframe();
    window.addEventListener('resize', () => {
      setupIframe();
      log('info', 'Window resized');
    });
    
    // Custom message handler for loading websites
    context.addCustomMessageListener('urn:x-cast:com.website.cast', (customEvent) => {
      const data = customEvent.data;
      log('info', `Custom message: ${JSON.stringify(data)}`);
      
      if (data.type === 'LOAD_WEBSITE') {
        loadWebsite(data.url);
      } else if (data.type === 'PING') {
        // Respond to ping from bridge
        log('info', 'PING received from bridge');
      } else if (data.type === 'TOGGLE_DEBUG') {
        if (debugLogVisible) {
          hideDebugPanel();
        } else {
          showDebugPanel();
        }
        log('info', `Debug log: ${debugLogVisible ? 'visible' : 'hidden'}`);
      }
    });
    
    // Override default media load behavior
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (loadRequestData) => {
        log('info', 'LOAD request received');
        
        let url = null;
        
        if (loadRequestData.media) {
          url = loadRequestData.media.contentId || loadRequestData.media.contentUrl;
          log('info', `Media URL: ${url}`);
          log('info', `Content type: ${loadRequestData.media.contentType}`);
        }
        
        if (url) {
          const isWebsite = 
            loadRequestData.media.contentType === 'text/html' ||
            url.endsWith('.html') ||
            (!url.match(/\.(mp4|mp3|webm|mkv|avi|mov|m3u8|mpd)$/i) && 
             (url.startsWith('http://') || url.startsWith('https://')));
          
          if (isWebsite) {
            loadWebsite(url);
            return null;
          }
        }
        
        return loadRequestData;
      }
    );
    
    function loadWebsite(url, isRetry = false) {
      // Skip reload if same URL is already loaded and working
      if (!isRetry && url === currentUrl && contentLoaded && healthCheckFailures === 0) {
        log('info', `📩 URL refresh received - already loaded, skipping reload`);
        return;
      }
      
      log('info', `Loading: ${url}${isRetry ? ' (retry)' : ''}`);
      
      currentUrl = url;
      contentLoaded = false;
      iframeLoadTime = null;
      healthCheckFailures = 0;
      
      // Reset retry counter on fresh load (not a retry)
      if (!isRetry) {
        loadRetryCount = 0;
      }
      
      setStatus('Loading: ' + url, 'warning');
      loadingEl.style.display = 'block';
      contentEl.style.display = 'none';
      
      // Set a load timeout - if iframe doesn't load within 30s, retry
      const loadTimeout = setTimeout(() => {
        if (!contentLoaded && currentUrl === url) {
          log('warn', '⏱️ Load timeout (30s)');
          scheduleRetry('load timeout');
        }
      }, 30000);
      
      contentEl.src = url;
      
      contentEl.onload = () => {
        clearTimeout(loadTimeout);
        iframeLoadTime = Date.now();
        contentLoaded = true;
        loadRetryCount = 0; // Reset on successful load
        
        log('info', `✅ Iframe loaded successfully`);
        setStatus('Connected', 'connected');
        loadingEl.style.display = 'none';
        contentEl.style.display = 'block';
        
        // Schedule debug panel auto-hide after successful load
        scheduleDebugAutoHide();
        
        // Hide status after 5 seconds
        setTimeout(() => {
          statusEl.style.opacity = '0.3';
        }, 5000);
      };
      
      contentEl.onerror = (error) => {
        clearTimeout(loadTimeout);
        const errorDetails = error?.message || error?.type || 'Unknown error';
        log('error', `❌ IFRAME LOAD ERROR: ${errorDetails}`);
        log('error', `❌ Failed URL: ${url}`);
        setStatus('Error loading website', 'error');
        loadingEl.style.display = 'none';
        contentLoaded = false;
        
        // Schedule retry on error
        scheduleRetry('load error');
      };
    }
    
    // Health check - verify iframe is still responsive
    function performHealthCheck() {
      const now = Date.now();
      const timeSinceLoad = iframeLoadTime ? Math.round((now - iframeLoadTime) / 1000) : 0;
      
      if (contentLoaded && currentUrl) {
        try {
          // Check if iframe still has a valid document
          const iframeDoc = contentEl.contentDocument || contentEl.contentWindow?.document;
          
          if (iframeDoc) {
            // Reset failure counter on success
            if (healthCheckFailures > 0) {
              log('info', `Health check recovered after ${healthCheckFailures} failures`);
              // Re-schedule auto-hide after recovery
              scheduleDebugAutoHide();
            }
            healthCheckFailures = 0;
            lastHealthCheck = now;
            
            log('info', `💚 Health OK (uptime: ${timeSinceLoad}s)`);
            // Re-schedule auto-hide on successful checks
            scheduleDebugAutoHide();
          } else {
            throw new Error('No document access');
          }
        } catch (e) {
          // Cross-origin restrictions prevent document access - this is normal for external sites
          // We can only detect if the iframe element itself is gone
          if (contentEl.src === currentUrl) {
            healthCheckFailures = 0;
            lastHealthCheck = now;
            log('info', `💚 Iframe present (uptime: ${timeSinceLoad}s, cross-origin)`);
            // Re-schedule auto-hide on successful checks
            scheduleDebugAutoHide();
          } else {
            healthCheckFailures++;
            log('warn', `⚠️ HEALTH CHECK ISSUE #${healthCheckFailures}: src mismatch`);
            log('warn', `⚠️ Expected: ${currentUrl}`);
            log('warn', `⚠️ Actual: ${contentEl.src}`);
            
            if (healthCheckFailures >= 3) {
              log('error', `❌ MULTIPLE HEALTH FAILURES - attempting reconnect`);
              log('error', `❌ This will show "Ready to cast..." until bridge re-casts`);
              contentLoaded = false; // Mark as not loaded so retry logic works
              scheduleRetry('health check failures');
            }
          }
        }
      } else if (!contentLoaded && currentUrl && loadRetryCount === 0) {
        // Only warn if we're not already in retry mode
        log('warn', `⏳ Still loading: ${currentUrl}`);
      }
    }
    
    // Run health check every 30 seconds
    setInterval(performHealthCheck, 30000);
    
    // Keep-alive heartbeat (every 10 seconds)
    setInterval(() => {
      const uptime = iframeLoadTime ? Math.round((Date.now() - iframeLoadTime) / 1000) : 0;
      log('info', `♥ Heartbeat (uptime: ${uptime}s, loaded: ${contentLoaded})`);
    }, 10000);
    
    // Auto-refresh to clear memory (configurable via URL param)
    const urlParams = new URLSearchParams(window.location.search);
    const refreshMinutes = parseInt(urlParams.get('refresh') || '45', 10);
    const refreshMs = refreshMinutes * 60 * 1000;
    const startTime = Date.now();
    log('info', `⏰ Auto-refresh scheduled: every ${refreshMinutes} min`);
    
    // Log time until next refresh every 5 minutes
    setInterval(() => {
      const elapsed = Math.round((Date.now() - startTime) / 60000);
      const remaining = refreshMinutes - elapsed;
      if (remaining > 0 && remaining % 5 === 0) {
        log('info', `⏰ Auto-refresh in ${remaining} min`);
      }
    }, 60000);
    
    setInterval(() => {
      const uptime = iframeLoadTime ? Math.round((Date.now() - iframeLoadTime) / 1000) : 0;
      log('warn', `🔄 AUTO-REFRESH TRIGGERED after ${refreshMinutes} min (iframe uptime: ${uptime}s)`);
      log('warn', '🔄 Receiver will reload - bridge must re-cast!');
      window.location.reload();
    }, refreshMs);
    
    // Monitor for Cast connection state
    context.addEventListener(cast.framework.system.EventType.SENDER_CONNECTED, (event) => {
      log('info', `📱 Sender connected: ${event.senderId || 'unknown'}`);
    });
    
    context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, (event) => {
      log('warn', `📱 Sender disconnected: ${event.senderId || 'unknown'}`);
      log('info', '📱 Content will persist - waiting for sender to reconnect');
      // Don't do anything - keep showing content, bridge will reconnect
    });
    
    context.addEventListener(cast.framework.system.EventType.SHUTDOWN, () => {
      log('error', '🛑 Receiver shutdown requested by system');
    });
    
    context.addEventListener(cast.framework.system.EventType.ERROR, (event) => {
      log('error', `❌ Cast error: ${JSON.stringify(event)}`);
    });
    
    // Start the receiver with maximum persistence settings
    const options = new cast.framework.CastReceiverOptions();
    options.disableIdleTimeout = true;
    options.maxInactivity = 0; // Prevent shutdown on sender disconnect
    
    context.start(options);
    log('info', '🚀 Chromecast receiver started');
    setStatus('Ready to cast...', '');
  </script>
</body>
</html>
