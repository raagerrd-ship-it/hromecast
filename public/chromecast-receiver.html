<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chromecast Website Receiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: Arial, sans-serif; }
    #content {
      border: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      transform: translate3d(0, 0, 0);
      will-change: transform;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      contain: layout;
    }
    #status { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 1000; max-width: 400px; }
    #status.connected { background: rgba(0,100,0,0.85); }
    #status.error { background: rgba(150,0,0,0.85); }
    #status.warning { background: rgba(150,100,0,0.85); }
    #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 24px; z-index: 999; }
    #debug-log { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 8px; font-size: 11px; z-index: 1000; max-width: 500px; max-height: 200px; overflow-y: auto; font-family: monospace; display: none; }
    #debug-log.has-errors { display: block; }
    .log-entry { margin: 2px 0; opacity: 0.9; }
    .log-entry.error { color: #ff6b6b; }
    .log-entry.warn { color: #ffd93d; }
  </style>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <div id="status">Starting receiver...</div>
  <div id="loading" style="display:none;">Loading website...</div>
  <div id="debug-log"></div>
  <iframe id="content" frameborder="0" scrolling="no" allow="autoplay" loading="eager" style="display:none; overflow: hidden; border: none;"></iframe>

  <script>
    // ============ MINIMAL RECEIVER v1.4.0 ============
    const RECEIVER_VERSION = '1.4.0';

    const statusEl = document.getElementById('status');
    const loadingEl = document.getElementById('loading');
    const contentEl = document.getElementById('content');
    const debugLogEl = document.getElementById('debug-log');

    function log(level, message) {
      console.log('[' + level.toUpperCase() + '] ' + message);
      if (level === 'error') {
        debugLogEl.classList.add('has-errors');
        const entry = document.createElement('div');
        entry.className = 'log-entry error';
        entry.textContent = new Date().toLocaleTimeString('sv-SE') + ' ' + message;
        debugLogEl.insertBefore(entry, debugLogEl.firstChild);
      }
    }

    window.onerror = function(msg, url, line) { log('error', msg + ' L' + line); return false; };
    window.onunhandledrejection = function(e) { log('error', 'Promise: ' + e.reason); };

    function setStatus(text, type) {
      statusEl.textContent = text;
      statusEl.className = type || '';
    }

    let currentUrl = null;

    function loadWebsite(url) {
      if (url === currentUrl) return;
      currentUrl = url;
      localStorage.setItem('lastUrl', url);
      setStatus('Loading...', 'warning');
      loadingEl.style.display = 'block';
      contentEl.style.display = 'none';
      contentEl.src = url;

      contentEl.onload = function() {
        setStatus('Connected', 'connected');
        loadingEl.style.display = 'none';
        contentEl.style.display = 'block';
        setTimeout(function() { statusEl.style.display = 'none'; }, 5000);
      };

      contentEl.onerror = function() {
        log('error', 'Iframe load failed');
        setStatus('Error loading website', 'error');
        loadingEl.style.display = 'none';
      };
    }

    // ============ INIT ============
    log('info', 'Receiver v' + RECEIVER_VERSION + ' | ' + window.innerWidth + 'x' + window.innerHeight);

    try {
      const context = cast.framework.CastReceiverContext.getInstance();

      context.addCustomMessageListener('urn:x-cast:com.website.cast', function(event) {
        if (event.data && event.data.type === 'LOAD_WEBSITE' && event.data.url) {
          loadWebsite(event.data.url);
        }
      });

      context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, function() {
        log('warn', 'Sender disconnected');
      });

      const options = new cast.framework.CastReceiverOptions();
      options.disableIdleTimeout = true;
      context.start(options);

      const savedUrl = localStorage.getItem('lastUrl');
      if (savedUrl) {
        loadWebsite(savedUrl);
      } else {
        setStatus('Ready to cast...', '');
      }
    } catch (err) {
      log('error', 'INIT: ' + err.message);
      setStatus('Init error: ' + err.message, 'error');
    }
  </script>
</body>
</html>
