name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_PROJECT_ID: "umxwaxzmoxwasryjibhe"
      VITE_SUPABASE_URL: "https://umxwaxzmoxwasryjibhe.supabase.co"
      VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVteHdheHptb3h3YXNyeWppYmhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ0OTc3OTgsImV4cCI6MjA4MDA3Mzc5OH0.R4hVdnkp310Wk-g0jZfy52EwxfV6z3Pfnv6uwhsf0ps"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build the main website (Vite/React)
      - run: npm ci
      - run: npm run build

      # Prepare engine with production dependencies
      - name: Prepare Engine
        working-directory: bridge-pi/engine
        run: npm install --omit=dev --package-lock=false

      - name: Compute Pi release version
        id: version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const rootPackagePath = path.join(process.cwd(), 'bridge-pi', 'package.json');
          const enginePackagePath = path.join(process.cwd(), 'bridge-pi', 'engine', 'package.json');
          const rootPackage = JSON.parse(fs.readFileSync(rootPackagePath, 'utf8'));
          const enginePackage = JSON.parse(fs.readFileSync(enginePackagePath, 'utf8'));

          const [major = '0', minor = '0'] = String(rootPackage.version || '0.0.0').split('.');
          const releaseVersion = `${major}.${minor}.${process.env.GITHUB_RUN_NUMBER}`;

          rootPackage.version = releaseVersion;
          enginePackage.version = releaseVersion;

          fs.writeFileSync(rootPackagePath, JSON.stringify(rootPackage, null, 2) + '\n');
          fs.writeFileSync(enginePackagePath, JSON.stringify(enginePackage, null, 2) + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `release_version=${releaseVersion}\n`);
          NODE

      # Package for Pi Control Center:
      # - engine/ with node_modules (Node.js backend)
      # - dist/ (static UI from public/)
      # - scripts/ (install, update, uninstall)
      - name: Create tarball
        working-directory: bridge-pi
        run: |
          mkdir -p ../release-staging/dist
          cp -r engine ../release-staging/engine
          cp -r public/* ../release-staging/dist/
          cp -r scripts ../release-staging/scripts
          cp service.json ../release-staging/
          chmod +x ../release-staging/scripts/*.sh
          cd ../release-staging
          tar czf ../dist.tar.gz engine/ dist/ scripts/ service.json

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.release_version }}
          name: Pi Build v${{ steps.version.outputs.release_version }}
          body: Automated Pi release for version ${{ steps.version.outputs.release_version }} from main branch
          make_latest: true
          files: dist.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
